name: Build and Commit APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'apk/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
      - run: gradle assembleDebug --no-daemon
      - run: mkdir -p apk && cp app/build/outputs/apk/debug/app-debug.apk apk/mobile-spire-debug.apk
      - run: git config user.name github-actions
      - run: git config user.email github-actions@github.com
      - run: git add apk/mobile-spire-debug.apk
      - run: git commit -m "Build debug APK" || echo "No APK changes"
      - run: git push
