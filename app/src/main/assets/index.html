<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mobile Spire</title>
<style>
html,body{margin:0;width:100%;height:100%;background:#05020a;color:#fde68a;font-family:Arial,sans-serif;overflow:hidden}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}.screen{width:100vw;height:100vh;background:radial-gradient(circle at top,#312e81,#020617 70%);padding:16px}.center{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center}.title{font-size:44px;line-height:.92;margin:0 0 18px;text-shadow:0 0 20px #f59e0b}.sub{font-size:15px;line-height:1.45;color:#fde68a;margin:0 0 24px;max-width:330px}.btn{border:1px solid #f59e0b;background:linear-gradient(#92400e,#451a03);color:#fff7ed;border-radius:14px;padding:14px 18px;font-size:16px;font-weight:bold;box-shadow:0 10px 24px #000}.top{height:58px;display:flex;align-items:center;justify-content:space-between;gap:8px}.pill{font-size:12px;padding:8px 10px;border:1px solid #f59e0b66;border-radius:999px;background:#0009;color:#fef3c7}.map{height:calc(100vh - 90px);display:flex;flex-direction:column;justify-content:space-around}.row{display:flex;justify-content:center;gap:18px}.node{width:66px;height:66px;border:1px solid #f59e0b;border-radius:22px;background:#111827;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 8px 22px #000}.locked{opacity:.25}.done{background:#065f46}.arena{height:calc(100vh - 300px);min-height:230px;display:flex;align-items:center;justify-content:space-between;position:relative}.hero,.enemy{width:130px;height:170px;border:1px solid #f59e0b66;border-radius:26px;background:#111827;position:relative;text-align:center;padding-top:24px;box-shadow:0 10px 30px #000}.sprite{font-size:64px}.hp{position:absolute;left:12px;right:12px;bottom:12px;height:18px;border:1px solid #fff4;border-radius:999px;background:#000;overflow:hidden}.hp div{height:100%;background:#22c55e}.name{position:absolute;left:0;right:0;bottom:36px;font-size:12px;color:#fef3c7}.intent{position:absolute;left:50%;top:-18px;transform:translateX(-50%);background:#7f1d1d;color:#fee2e2;border:1px solid #fca5a5;border-radius:999px;padding:6px 10px;font-size:12px}.log{position:absolute;left:50%;bottom:0;transform:translateX(-50%);background:#000a;border:1px solid #f59e0b66;border-radius:999px;padding:8px 12px;font-size:12px;white-space:nowrap}.hand{height:154px;display:flex;gap:8px;overflow-x:auto;padding:10px 0}.card{min-width:104px;max-width:104px;border:1px solid #f59e0b;border-radius:14px;background:linear-gradient(#292524,#111827);padding:9px;color:#fef3c7}.card.off{opacity:.35}.cost{width:25px;height:25px;border-radius:50%;background:#2563eb;border:1px solid #93c5fd;display:flex;align-items:center;justify-content:center;font-weight:bold}.card h3{font-size:14px;margin:8px 0 5px}.card p{font-size:11px;margin:0;color:#fde68a}.controls{height:72px;display:flex;gap:8px}.controls .btn{flex:1}.reward{height:calc(100vh - 90px);display:flex;flex-direction:column;gap:12px;justify-content:center}.choice{border:1px solid #f59e0b;border-radius:16px;background:#111827;padding:16px;display:flex;gap:12px;align-items:center}.choice b{display:block}.choice span{font-size:12px;color:#fde68a}
</style>
</head>
<body><div id="app"></div>
<script>
(function(){
var A=document.getElementById('app');
var S={screen:'menu',floor:0,hp:80,max:80,block:0,energy:3,gold:0,deck:['Strike','Strike','Strike','Defend','Defend','Bash'],draw:[],discard:[],hand:[],enemy:null,done:{},log:''};
var C={
 Strike:{c:1,t:'Attack',d:'Deal 6 damage'},
 Defend:{c:1,t:'Skill',d:'Gain 5 block'},
 Bash:{c:2,t:'Attack',d:'Deal 8 damage'},
 Cleave:{c:1,t:'Attack',d:'Deal 9 damage'},
 Guard:{c:1,t:'Skill',d:'Gain 8 block'},
 Rage:{c:0,t:'Power',d:'Deal 2 and block 2'},
 Poison:{c:1,t:'Skill',d:'Deal 4 and block 4'}
};
function r(n){return Math.floor(Math.random()*n)}
function shuffle(a){var i,j,t;for(i=a.length-1;i>0;i--){j=r(i+1);t=a[i];a[i]=a[j];a[j]=t}return a}
function top(){return '<div class="top"><div class="pill">FLOOR '+(S.floor+1)+'</div><div class="pill">♥ '+S.hp+'/'+S.max+' · 🛡 '+S.block+' · ⚡ '+S.energy+' · 🪙 '+S.gold+'</div></div>'}
function render(){if(S.screen==='menu')menu();else if(S.screen==='map')map();else if(S.screen==='combat')combat();else if(S.screen==='reward')reward();else finish(S.screen==='win')}
function menu(){A.innerHTML='<div class="screen"><div class="center"><h1 class="title">MOBILE<br>SPIRE</h1><p class="sub">APK test build. Pick a path, fight enemies, play cards, climb the spire.</p><button class="btn" id="start">START RUN</button></div></div>';document.getElementById('start').onclick=start}
function start(){S.screen='map';S.floor=0;S.hp=80;S.max=80;S.block=0;S.energy=3;S.gold=0;S.deck=['Strike','Strike','Strike','Defend','Defend','Bash'];S.done={};S.log='Choose a path';render()}
function map(){var h='<div class="screen">'+top()+'<div class="map">';for(var row=5;row>=0;row--){h+='<div class="row">';for(var c=0;c<3;c++){var id=row+'-'+c;var ok=row===S.floor&&!S.done[id];var cls='node'+(ok?'':' locked')+(S.done[id]?' done':'');var ico=S.done[id]?'✓':(row===5?'👑':(c===0?'⚔':(c===1?'?':'💰')));h+='<div class="'+cls+'" data-row="'+row+'" data-col="'+c+'">'+ico+'</div>'}h+='</div>'}h+='</div></div>';A.innerHTML=h;var nodes=document.getElementsByClassName('node');for(var i=0;i<nodes.length;i++){nodes[i].onclick=function(){if(this.className.indexOf('locked')<0)go(parseInt(this.getAttribute('data-row')),parseInt(this.getAttribute('data-col')))}}}
function makeEnemy(boss){if(boss)return {name:'Void King',hp:120,max:120,intent:15,face:'👑'};var p=[['Goblin',30,7,'👺'],['Slime',26,6,'🟢'],['Wraith',34,9,'👻'],['Knight',42,10,'💀']][r(4)];var hp=p[1]+S.floor*4;return{name:p[0],hp:hp,max:hp,intent:p[2]+Math.floor(S.floor/2),face:p[3]}}
function go(row,col){S.done[row+'-'+col]=1;if(col===2&&row<5&&r(2)===0){S.gold+=18;S.floor++;S.screen='reward';render();return}S.enemy=makeEnemy(row===5);beginCombat()}
function beginCombat(){S.screen='combat';S.block=0;S.energy=3;S.draw=shuffle(S.deck.slice(0));S.discard=[];S.hand=[];draw(5);S.log='A '+S.enemy.name+' appears';render()}
function draw(n){for(var i=0;i<n;i++){if(S.draw.length===0){S.draw=shuffle(S.discard);S.discard=[]}if(S.draw.length>0)S.hand.push(S.draw.pop())}}
function play(idx){var name=S.hand[idx];var card=C[name];if(!card||S.energy<card.c)return;S.energy-=card.c;S.hand.splice(idx,1);S.discard.push(name);if(name==='Defend')block(5);else if(name==='Guard')block(8);else if(name==='Rage'){block(2);damage(2)}else if(name==='Poison'){damage(4);block(4)}else if(name==='Bash')damage(8);else if(name==='Cleave')damage(9);else damage(6);if(S.enemy.hp<=0){winFight();return}render()}
function damage(n){S.enemy.hp=Math.max(0,S.enemy.hp-n);S.log='Dealt '+n+' damage'}
function block(n){S.block+=n;S.log='Gained '+n+' block'}
function endTurn(){var hit=Math.max(0,S.enemy.intent-S.block);S.hp-=hit;S.block=0;while(S.hand.length)S.discard.push(S.hand.pop());if(S.hp<=0){S.screen='dead';render();return}S.enemy.intent=Math.max(5,S.enemy.intent+r(5)-2);S.energy=3;draw(5);S.log=S.enemy.name+' hits for '+hit;render()}
function winFight(){S.gold+=10+r(8);S.floor++;S.screen=S.enemy.name==='Void King'?'win':'reward';render()}
function combat(){var e=S.enemy;var h='<div class="screen">'+top()+'<div class="arena"><div class="hero"><div class="sprite">🧙</div><div class="name">YOU '+S.hp+'/'+S.max+'</div><div class="hp"><div style="width:'+(100*S.hp/S.max)+'%"></div></div></div><div class="enemy"><div class="intent">⚔ '+e.intent+'</div><div class="sprite">'+e.face+'</div><div class="name">'+e.name+' '+e.hp+'/'+e.max+'</div><div class="hp"><div style="width:'+(100*e.hp/e.max)+'%"></div></div></div><div class="log">'+S.log+'</div></div><div class="hand">';for(var i=0;i<S.hand.length;i++){var n=S.hand[i],c=C[n],off=S.energy<c.c?' off':'';h+='<div class="card'+off+'" data-i="'+i+'"><div class="cost">'+c.c+'</div><h3>'+n+'</h3><p>'+c.t+'</p><p>'+c.d+'</p></div>'}h+='</div><div class="controls"><button class="btn" id="end">END TURN</button><button class="btn" id="map">MAP</button></div></div>';A.innerHTML=h;var cards=document.getElementsByClassName('card');for(var k=0;k<cards.length;k++){cards[k].onclick=function(){play(parseInt(this.getAttribute('data-i')))}}document.getElementById('end').onclick=endTurn;document.getElementById('map').onclick=function(){S.screen='map';render()}}
function reward(){var pool=['Cleave','Guard','Rage','Poison'];var h='<div class="screen">'+top()+'<div class="reward"><h2>Choose reward</h2>';for(var i=0;i<3;i++){var n=pool[r(pool.length)];h+='<div class="choice" data-card="'+n+'"><div class="cost">'+C[n].c+'</div><div><b>'+n+'</b><span>'+C[n].d+'</span></div></div>'}h+='<button class="btn" id="skip">SKIP</button></div></div>';A.innerHTML=h;var ch=document.getElementsByClassName('choice');for(var j=0;j<ch.length;j++){ch[j].onclick=function(){S.deck.push(this.getAttribute('data-card'));S.screen=S.floor>=6?'win':'map';render()}}document.getElementById('skip').onclick=function(){S.screen=S.floor>=6?'win':'map';render()}}
function finish(ok){A.innerHTML='<div class="screen"><div class="center"><h1 class="title">'+(ok?'VICTORY':'DEATH')+'</h1><p class="sub">'+(ok?'The spire is broken.':'The spire claims another soul.')+'</p><button class="btn" id="again">TRY AGAIN</button></div></div>';document.getElementById('again').onclick=start}
window.onerror=function(msg){A.innerHTML='<div class="screen"><div class="center"><h1 class="title">ERROR</h1><p class="sub">'+msg+'</p><button class="btn" onclick="location.reload()">RELOAD</button></div></div>';return true};
render();
})();
</script></body>
</html>
