<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Mobile Spire</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#05020a;color:#fde68a;font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:manipulation;user-select:none}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}button{font:inherit}.screen{width:100vw;height:100vh;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 20%,#312e81 0,#111827 42%,#020617 100%)}.top{height:64px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,#000b,#0002);border-bottom:1px solid #f59e0b33}.pill{padding:7px 10px;border:1px solid #f59e0b55;border-radius:999px;background:#0007;color:#fef3c7;font-size:12px}.btn{border:1px solid #f59e0b88;background:linear-gradient(180deg,#78350f,#451a03);color:#fef3c7;border-radius:12px;padding:11px 14px;box-shadow:0 8px 20px #0008}.btn:active,.card:active,.node:active{transform:scale(.96)}.title{font-size:42px;line-height:.95;margin:0;text-shadow:0 0 26px #f59e0b99;letter-spacing:2px}.center{height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:22px}.sub{color:#fde68aaa;margin:16px 0 28px;max-width:340px}.map{height:calc(100vh - 64px);padding:18px;display:flex;flex-direction:column;justify-content:space-around}.row{display:flex;justify-content:center;gap:18px}.node{width:64px;height:64px;border-radius:22px;border:1px solid #f59e0b77;background:#111827;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 10px 30px #000a,0 0 20px #f59e0b22}.node.lock{opacity:.25;filter:grayscale(1)}.node.done{background:#064e3b}.combat{height:calc(100vh - 64px);display:grid;grid-template-rows:1fr 172px 86px}.arena{position:relative;padding:18px;display:flex;align-items:center;justify-content:space-between}.char,.enemy{width:132px;height:180px;border:1px solid #f59e0b44;border-radius:28px;background:linear-gradient(180deg,#1f2937,#020617);position:relative;box-shadow:0 14px 35px #000b}.char:before{content:"";position:absolute;left:32px;top:28px;width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#92400e);box-shadow:0 0 24px #f59e0b77}.char:after{content:"⚔";position:absolute;left:42px;top:104px;font-size:48px}.enemy:before{content:"";position:absolute;left:25px;top:24px;width:82px;height:74px;border-radius:44% 44% 52% 52%;background:linear-gradient(135deg,#ef4444,#7f1d1d);box-shadow:0 0 26px #ef444477}.enemy:after{content:attr(data-face);position:absolute;left:0;right:0;top:92px;text-align:center;font-size:52px}.bar{position:absolute;left:10px;right:10px;bottom:12px;height:18px;border:1px solid #fff3;border-radius:99px;background:#0009;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#16a34a,#84cc16)}.stat{position:absolute;left:0;right:0;bottom:34px;text-align:center;font-size:12px;color:#fef3c7}.intent{position:absolute;top:-18px;left:50%;transform:translateX(-50%);padding:6px 9px;border-radius:999px;background:#7f1d1d;border:1px solid #fca5a5;color:#fee2e2;font-size:12px}.hand{display:flex;gap:8px;overflow-x:auto;padding:10px 10px 14px;align-items:stretch}.card{min-width:104px;max-width:104px;border:1px solid #f59e0b88;border-radius:14px;background:linear-gradient(180deg,#292524,#111827);padding:9px;color:#fef3c7;box-shadow:0 9px 18px #0008}.cost{width:25px;height:25px;border-radius:50%;background:#2563eb;border:1px solid #93c5fd;display:flex;align-items:center;justify-content:center;font-weight:800}.card h3{margin:8px 0 5px;font-size:14px;line-height:1.05}.card p{margin:0;font-size:11px;color:#fde68acc}.disabled{opacity:.35}.controls{display:flex;gap:8px;padding:10px;background:#0007;border-top:1px solid #f59e0b33}.controls .btn{flex:1}.reward{height:calc(100vh - 64px);display:flex;flex-direction:column;padding:18px;gap:12px}.reward h2{text-align:center;margin:8px 0 4px}.choice{border:1px solid #f59e0b77;border-radius:16px;background:#111827;padding:14px;display:flex;gap:12px;align-items:center}.choice b{display:block;color:#fef3c7}.choice span{font-size:12px;color:#fde68aaa}.log{position:absolute;left:50%;bottom:266px;transform:translateX(-50%);background:#000a;border:1px solid #f59e0b55;border-radius:999px;padding:8px 12px;font-size:12px;color:#fef3c7;white-space:nowrap}.shake{animation:shake .25s}.hit{animation:hit .25s}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}@keyframes hit{0%,100%{filter:none}50%{filter:brightness(2)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const A=document.getElementById('app');
let S={screen:'menu',floor:0,path:0,hp:80,max:80,block:0,energy:3,gold:0,deck:['Strike','Strike','Strike','Defend','Defend','Bash'],draw:[],discard:[],hand:[],enemy:null,log:'',done:{},act:1};
const cards={Strike:{c:1,t:'Attack',d:'Deal 6 damage.',play:()=>dmg(6)},Defend:{c:1,t:'Skill',d:'Gain 5 block.',play:()=>blk(5)},Bash:{c:2,t:'Attack',d:'Deal 8. Enemy loses intent.',play:()=>{dmg(8);S.enemy.intent=Math.max(3,S.enemy.intent-4)}},Cleave:{c:1,t:'Attack',d:'Deal 9 damage.',play:()=>dmg(9)},Guard:{c:1,t:'Skill',d:'Gain 8 block.',play:()=>blk(8)},Rage:{c:0,t:'Power',d:'Gain 2 block and 2 damage.',play:()=>{blk(2);dmg(2)}},Poison:{c:1,t:'Skill',d:'Deal 4 and gain 4 block.',play:()=>{dmg(4);blk(4)}}};
function R(n){return Math.floor(Math.random()*n)}
function enemy(){let pool=[['Goblin',28,7,'👺'],['Slime',24,6,'🟢'],['Wraith',34,9,'👻'],['Knight',42,10,'💀']];if(S.floor>4)pool.push(['Void King',70,13,'👑']);let e=pool[Math.min(pool.length-1,R(pool.length))];return{name:e[0],hp:e[1]+S.floor*4,max:e[1]+S.floor*4,intent:e[2]+Math.floor(S.floor/2),face:e[3]}}
function start(){S={screen:'map',floor:0,path:0,hp:80,max:80,block:0,energy:3,gold:0,deck:['Strike','Strike','Strike','Defend','Defend','Bash'],draw:[],discard:[],hand:[],enemy:null,log:'Choose your path',done:{},act:1};render()}
function top(){return `<div class="top"><div class="pill">ACT ${S.act} · FLOOR ${S.floor+1}</div><div class="pill">♥ ${S.hp}/${S.max} · 🛡 ${S.block} · ⚡ ${S.energy} · 🪙 ${S.gold}</div></div>`}
function render(){if(S.screen==='menu')menu();if(S.screen==='map')map();if(S.screen==='combat')combat();if(S.screen==='reward')reward();if(S.screen==='dead')end(false);if(S.screen==='win')end(true)}
function menu(){A.innerHTML=`<div class="screen"><div class="center"><h1 class="title">MOBILE<br>SPIRE</h1><div class="sub">Mobile roguelike deckbuilder prototype packaged as Android APK. Pick paths, fight enemies, play cards, climb the spire.</div><button class="btn" onclick="start()">START RUN</button></div></div>`}
function map(){let rows='';for(let r=5;r>=0;r--){rows+=`<div class="row">`;for(let c=0;c<3;c++){let id=r+'-'+c,ok=r===S.floor&&!S.done[id],done=S.done[id],ico=r===5?'👑':(c===0?'⚔':c===1?'?':'💰');rows+=`<div class="node ${ok?'':'lock'} ${done?'done':''}" onclick="${ok?`go(${r},${c})`:''}">${done?'✓':ico}</div>`}rows+='</div>'}A.innerHTML=`<div class="screen">${top()}<div class="map">${rows}</div></div>`}
function go(r,c){S.path=c;S.done[r+'-'+c]=1;if(r===5){S.enemy={name:'Void Sovereign',hp:120,max:120,intent:16,face:'👑'}}else if(c===1&&Math.random()<.45){S.hp=Math.min(S.max,S.hp+14);S.gold+=8;S.floor++;S.log='Fountain found: healed and gained gold';S.screen='map';render();return}else if(c===2&&Math.random()<.5){S.gold+=20;S.floor++;S.log='Treasure: +20 gold';S.screen='reward';render();return}else S.enemy=enemy();beginCombat()}
function beginCombat(){S.screen='combat';S.block=0;S.draw=shuffle([...S.deck]);S.discard=[];draw(5);S.energy=3;S.log='A '+S.enemy.name+' appears';render()}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=R(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}
function draw(n){for(let i=0;i<n;i++){if(!S.draw.length){S.draw=shuffle(S.discard);S.discard=[]}if(S.draw.length)S.hand.push(S.draw.pop())}}
function play(i){let name=S.hand[i],card=cards[name];if(!card||S.energy<card.c)return;S.energy-=card.c;S.hand.splice(i,1);S.discard.push(name);card.play();if(S.enemy.hp<=0){winCombat();return}render()}
function dmg(n){S.enemy.hp=Math.max(0,S.enemy.hp-n);S.log='Dealt '+n+' damage'}
function blk(n){S.block+=n;S.log='Gained '+n+' block'}
function endTurn(){let raw=S.enemy.intent,real=Math.max(0,raw-S.block);S.hp-=real;S.block=0;S.hand.forEach(x=>S.discard.push(x));S.hand=[];if(S.hp<=0){S.screen='dead';render();return}S.energy=3;S.enemy.intent=Math.max(5,S.enemy.intent+R(5)-2);draw(5);S.log=S.enemy.name+' hits for '+real;render()}
function winCombat(){S.gold+=10+R(8);S.floor++;if(S.enemy.name==='Void Sovereign'){S.screen='win'}else{S.screen='reward'}render()}
function combat(){let e=S.enemy;let hand=S.hand.map((n,i)=>{let c=cards[n],dis=S.energy<c.c?'disabled':'';return `<div class="card ${dis}" onclick="play(${i})"><div class="cost">${c.c}</div><h3>${n}</h3><p>${c.t}</p><p>${c.d}</p></div>`}).join('');A.innerHTML=`<div class="screen">${top()}<div class="combat"><div class="arena"><div class="char"><div class="stat">YOU · ${S.hp}/${S.max}</div><div class="bar"><div class="fill" style="width:${100*S.hp/S.max}%"></div></div></div><div class="enemy" data-face="${e.face}"><div class="intent">⚔ ${e.intent}</div><div class="stat">${e.name} · ${e.hp}/${e.max}</div><div class="bar"><div class="fill" style="width:${100*e.hp/e.max}%"></div></div></div><div class="log">${S.log}</div></div><div class="hand">${hand}</div><div class="controls"><button class="btn" onclick="endTurn()">END TURN</button><button class="btn" onclick="S.screen='map';render()">MAP</button></div></div></div>`}
function reward(){let pool=['Cleave','Guard','Rage','Poison'];let opts=[pool[R(pool.length)],pool[R(pool.length)],pool[R(pool.length)]];A.innerHTML=`<div class="screen">${top()}<div class="reward"><h2>Choose a reward</h2>${opts.map(n=>`<div class="choice" onclick="take('${n}')"><div class="cost">${cards[n].c}</div><div><b>${n}</b><span>${cards[n].d}</span></div></div>`).join('')}<button class="btn" onclick="skip()">SKIP</button></div></div>`}
function take(n){S.deck.push(n);S.screen=S.floor>=6?'win':'map';S.log='Added '+n+' to deck';render()}
function skip(){S.screen=S.floor>=6?'win':'map';render()}
function end(ok){A.innerHTML=`<div class="screen"><div class="center"><h1 class="title">${ok?'VICTORY':'DEATH'}</h1><div class="sub">${ok?'The spire is broken.':'The spire claims another soul.'}</div><button class="btn" onclick="start()">TRY AGAIN</button></div></div>`}
render();
</script>
</body>
</html>
